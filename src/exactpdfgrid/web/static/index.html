<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ExactPdfGrid – PDF Table Extraction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header-decoration"></div>

    <div class="header">
      <div class="title-icon">📊</div>
      <div>
        <h1 class="main-title">ExactPdfGrid</h1>
        <p class="subtitle">PDF tables → Excel converter</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="form-section">

      <!-- PDF upload -->
      <div class="field">
        <label class="label-icon">📄 PDF file</label>
        <input id="pdfFile" type="file" accept="application/pdf" />
        <div id="pdfUploadArea" class="pdf-upload-area">
          <div class="upload-icon">📁</div>
          <p class="upload-text">Drop a PDF here</p>
          <p class="upload-subtext">or click to choose a file</p>
          <div id="fileName" class="file-name"></div>
        </div>
      </div>

      <!-- Detection mode -->
      <div class="field">
        <label class="label-icon">🧭 Detection mode</label>
        <select id="mode" class="select-input">
          <option value="lines">Lines (bordered tables)</option>
          <option value="lineless">Lineless (aligned text, no borders)</option>
        </select>
      </div>

      <!-- Text engine -->
      <div class="field">
        <label class="label-icon">🔤 Text engine</label>
        <select id="engine" class="select-input">
          <option value="pymupdf">PyMuPDF (native vector text, default)</option>
          <option value="rapidocr">RapidOCR (auto: OpenVINO → ONNX)</option>
          <option value="rapidocr-vino">RapidOCR — OpenVINO</option>
          <option value="rapidocr-onnx">RapidOCR — ONNX Runtime</option>
        </select>
      </div>

      <!-- Advanced settings -->
      <div class="field">
        <label class="label-icon adv-toggle" id="advToggle" role="button" tabindex="0">
          ⚙️ Advanced settings
          <span class="toggle-arrow">▶</span>
        </label>
        <div id="advPanel" class="adv-panel collapsed">
          <div class="adv-row">
            <label>DPI</label>
            <input type="number" id="dpi" value="200" min="72" max="600" />
          </div>
          <div class="adv-row">
            <label>Ink threshold</label>
            <input type="number" id="inkThreshold" value="240" min="100" max="255" />
          </div>
          <div class="adv-row">
            <label>Cluster gap</label>
            <input type="number" id="clusterGap" value="8" min="1" max="40" />
          </div>
          <!-- lines mode only -->
          <div class="adv-row lines-only">
            <label>Min line length (px)</label>
            <input type="number" id="minLine" value="8" min="1" max="200" />
          </div>
          <div class="adv-row lines-only">
            <label>Line aspect ratio</label>
            <input type="number" id="aspectRatio" value="40" min="1" max="100" step="0.5" />
          </div>
          <!-- lineless mode only -->
          <div class="adv-row lineless-only">
            <label>Min column corridor (px)</label>
            <input type="number" id="llMinGapV" value="6" min="1" max="200" />
          </div>
          <div class="adv-row lineless-only">
            <label>Max column corridor (0=none)</label>
            <input type="number" id="llMaxGapV" value="0" min="0" max="500" />
          </div>
          <div class="adv-row lineless-only">
            <label>Min row corridor (px)</label>
            <input type="number" id="llMinGapH" value="4" min="1" max="200" />
          </div>
          <div class="adv-row lineless-only">
            <label>Max row corridor (0=none)</label>
            <input type="number" id="llMaxGapH" value="0" min="0" max="500" />
          </div>
          <div class="adv-row lineless-only">
            <label>Corridor ink tolerance</label>
            <input type="number" id="llInkTol" value="0" min="0" max="9999" />
          </div>
        </div>
      </div>

      <!-- Submit button -->
      <button id="convertBtn" class="btn-primary">Convert & download xlsx</button>
    </div>

    <!-- Status -->
    <div id="status" class="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
